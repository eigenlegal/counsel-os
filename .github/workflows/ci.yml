name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Eval scorer self-test
        run: bun run evals:self-test

      - name: Law frontmatter warnings
        run: bun run law:frontmatter

      - name: Knowledge conventions + manifest version sync
        run: python3 scripts/lint_knowledge.py --check-versions

      - name: Script syntax (python + shell)
        run: |
          python3 -m py_compile scripts/*.py
          for f in scripts/*.sh backup restore setup update; do bash -n "$f"; done
