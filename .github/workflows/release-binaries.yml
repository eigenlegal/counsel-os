name: Release binaries

# Builds standalone `counsel-browse` binaries (the browse/ bun + Playwright
# daemon) for each supported platform and attaches them to the GitHub release
# for the pushed tag, PLUS a matching browsers tarball
# (counsel-browse-browsers-{platform}.tar.gz) containing the exact Chromium +
# headless-shell + ffmpeg builds the pinned playwright version expects.
# browse/bin/find-browse downloads both on machines with no bun/node
# toolchain, making marketplace installs fully self-sufficient.
#
# The smoke test only verifies the binary starts and prints usage; `--help`
# exits before any browser is launched.

on:
  push:
    tags:
      - 'v*'
  # Manual repair path: rebuild and re-upload assets for an existing release
  # using the CURRENT workflow file (tag-triggered runs use the workflow as of
  # the tagged commit, so a workflow fix can't be re-run against an old tag).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build assets for (e.g. v0.9.23)'
        required: true

permissions:
  contents: write

env:
  # The tag being built: the pushed tag, or the workflow_dispatch input.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  # Create the release once, before the build matrix fans out. This avoids
  # the race where concurrent matrix jobs all try `gh release create` for
  # the same tag and one of them fails.
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Create GitHub release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists — skipping create."
          else
            gh release create "$RELEASE_TAG" --verify-tag --generate-notes
          fi

  build:
    name: Build ${{ matrix.artifact }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: counsel-browse-darwin-arm64
          - os: macos-13
            artifact: counsel-browse-darwin-x64
          - os: ubuntu-latest
            artifact: counsel-browse-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      # Dependencies (playwright) live in the repo-root package.json /
      # bun.lock — browse/ has no package.json of its own.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Mirrors the root package.json "build" script (same entrypoint and
      # externals), but with a per-platform output name.
      - name: Compile standalone binary
        run: >
          bun build --target=bun --compile -e electron -e 'chromium-bidi/*'
          browse/src/cli.ts
          --outfile "browse/dist/${{ matrix.artifact }}"

      # `--help` prints usage and exits 0 without contacting the daemon or
      # launching Chromium, so it is safe on a runner with no browsers.
      - name: Smoke test
        run: ./browse/dist/${{ matrix.artifact }} --help

      # Package the exact browser builds this playwright version expects
      # (chromium + chromium_headless_shell + ffmpeg, as installed into the
      # runner's ms-playwright cache) so find-browse can install them on
      # machines with no toolchain. The tar runs FROM INSIDE the cache dir so
      # the shell expands the globs there (a -C flag changes tar's directory
      # but not where the shell expands wildcards) and the archive extracts
      # directly into a user's ms-playwright directory.
      - name: Package Playwright browsers
        run: |
          bunx playwright install chromium
          if [ "$RUNNER_OS" = "macOS" ]; then
            CACHE="$HOME/Library/Caches/ms-playwright"
          else
            CACHE="$HOME/.cache/ms-playwright"
          fi
          OUT="$GITHUB_WORKSPACE/browse/dist/${{ matrix.artifact }}-browsers.tar.gz"
          cd "$CACHE"
          DIRS=$(ls -d chromium* ffmpeg* 2>/dev/null || true)
          if [ -z "$DIRS" ]; then
            echo "ERROR: no browser dirs found in $CACHE:"; ls -la "$CACHE"; exit 1
          fi
          echo "packaging: $DIRS"
          tar -czf "$OUT" $DIRS
          ls -lh "$OUT"

      - name: Upload binary and browsers to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" "browse/dist/${{ matrix.artifact }}" --clobber
          gh release upload "$RELEASE_TAG" "browse/dist/${{ matrix.artifact }}-browsers.tar.gz" --clobber
